<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckCounter - Control de Acceso</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { background: #1a2a3a; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card p { font-size: 1.8rem; font-weight: bold; margin: 5px 0; color: #3498db; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; }
        .status-tag { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; background: #2ecc71; color: white; }
        #timer { font-size: 0.8rem; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚚 Panel TruckCounter</h1>
        <div id="timer">Sincronizado con Firebase (Tiempo Real)</div>
    </header>

    <div class="stats">
        <div class="card"><h2>Total Registros</h2><p id="total-count">0</p></div>
        <div class="card"><h2>Último ID</h2><p id="last-truck">---</p></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha y Hora</th>
                <th>UID Camión</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://truckcounter-85b8c-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Función principal de carga
    function cargarDatos() {
        db.ref('log_camiones').limitToLast(50).once('value', (snapshot) => {
            const data = snapshot.val();
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = ''; 

            if (data) {
                const entries = Object.keys(data).map(key => ({
                    ...data[key]
                })).reverse();

                document.getElementById('total-count').innerText = entries.length;

                entries.forEach((entry, index) => {
                    // SI SALE "PENDIENTE": Asegúrate de que el ESP32 envíe el campo 'timestamp'
                    let fechaDisplay = "Sin Fecha (Revisar ESP32)";
                    
                    if (entry.timestamp) {
                        fechaDisplay = new Date(entry.timestamp).toLocaleString('es-CL');
                    }

                    tableBody.innerHTML += `<tr>
                        <td>${fechaDisplay}</td>
                        <td><code>${entry.uid || 'Desconocido'}</code></td>
                        <td><span class="status-tag">${entry.estado || 'OK'}</span></td>
                    </tr>`;

                    if(index === 0) document.getElementById('last-truck').innerText = entry.uid || '---';
                });
            }
        });
    }

    // 1. Carga inicial
    cargarDatos();

    // 2. RECARGA CADA 5 SEGUNDOS (Como pediste)
    setInterval(() => {
        console.log("Recargando datos...");
        cargarDatos();
        document.getElementById('timer').innerText = "Última actualización: " + new Date().toLocaleTimeString();
    }, 5000);

</script>
</body>
</html>
