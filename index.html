<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Control de Acceso Camiones</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h2 { margin: 0; color: #7f8c8d; font-size: 1rem; }
        .card p { font-size: 2rem; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f9f9f9; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #2ecc71; color: white; }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚚 Sistema de Control de Peaje</h1>
        <p>Monitoreo en Tiempo Real - Firebase RTDB</p>
    </header>

    <div class="stats">
        <div class="card">
            <h2>Total de Registros</h2>
            <p id="total-count">0</p>
        </div>
        <div class="card">
            <h2>Último Camión (ID)</h2>
            <p id="last-truck" style="font-size: 1.2rem;">---</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha y Hora</th>
                <th>ID del Camión (UID)</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    // CONFIGURACIÓN DE TU FIREBASE
    const firebaseConfig = {
        databaseURL: "https://truckcounter-85b8c-default-rtdb.firebaseio.com"
    };
    
    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logRef = db.ref('log_camiones');

    // Escuchar cambios en tiempo real
    logRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const tableBody = document.getElementById('table-body');
        const totalCount = document.getElementById('total-count');
        const lastTruck = document.getElementById('last-truck');
        
        tableBody.innerHTML = ''; 
        let count = 0;

        if (data) {
            // Convertimos el objeto de Firebase en un Array para poder ordenarlo
            const entries = Object.keys(data).map(key => ({
                id_db: key,
                ...data[key]
            })).reverse(); // .reverse() para mostrar el más nuevo arriba

            count = entries.length;

            entries.forEach((entry, index) => {
                // LÓGICA DE FECHA: 
                // 1. Si existe entry.timestamp (milisegundos), lo convierte a fecha legible.
                // 2. Si no existe, muestra "Fecha no disponible".
                let fechaLegible = "Fecha no disponible";
                if (entry.timestamp) {
                    const dateObj = new Date(entry.timestamp);
                    fechaLegible = dateObj.toLocaleString('es-ES', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }

                const uid = entry.uid || entry.id || "Desconocido";
                const estado = entry.evento || entry.estado || "Registrado";

                const row = `
                    <tr>
                        <td>${fechaLegible}</td>
                        <td><code>${uid}</code></td>
                        <td><span class="status">${estado}</span></td>
                    </tr>`;
                
                tableBody.innerHTML += row;

                // Actualizar el card del último camión detectado
                if(index === 0) {
                    lastTruck.innerText = uid;
                }
            });
        }
        totalCount.innerText = count;
    }, (error) => {
        console.error("Error leyendo Firebase: ", error);
    });
</script>

</body>
</html>
